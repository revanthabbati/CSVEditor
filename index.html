<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spreadsheet Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-workspace {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        /* --- Custom Jspreadsheet Adjustments --- */
        .jexcel_container { width: 100% !important; height: 100% !important; }
        .jexcel_content { 
            height: 100% !important; 
            width: 100% !important;
            box-shadow: none;
        }

        /* --- Advanced Dark Mode Theme for Spreadsheet --- */
        html.dark .jexcel_container { background: #1f2937 !important; border-color: #374151 !important; }
        html.dark .jexcel_content { background: #1f2937 !important; }
        html.dark .jexcel tbody tr td {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            border-bottom: 1px solid #374151 !important;
            border-right: 1px solid #374151 !important;
        }
        html.dark .jexcel thead td {
            background-color: #111827 !important;
            color: #9ca3af !important;
            border-bottom: 1px solid #374151 !important;
            border-right: 1px solid #374151 !important;
        }
        html.dark .jexcel tbody tr td.readonly { background-color: #374151 !important; }
        html.dark .jexcel tbody tr td.highlight { background-color: #374151 !important; }
        html.dark .jexcel_toolbar { background-color: #111827 !important; border-color: #374151 !important; color: #f3f4f6; }
        html.dark .jexcel_toolbar i { color: #d1d5db !important; }
        html.dark .jexcel_toolbar i:hover { background-color: #374151 !important; }
        html.dark .jsuites-search-root input { background: #1f2937; color: white; border-color: #374151; }
        html.dark .jexcel-filter { background: #111827 !important; color: white !important; border-color: #374151 !important;}

        /* Dropdown mechanics */
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">

    <div id="app-container">
        
        <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-2 flex items-center justify-between z-10 shadow-sm flex-none transition-colors duration-200">
            
            <div class="flex items-center space-x-3">
                <div class="bg-green-600 p-1.5 rounded text-white flex items-center justify-center">
                    <span class="material-icons">table_chart</span>
                </div>
                <div>
                    <input type="text" id="doc-title" value="Untitled Spreadsheet" class="text-lg font-medium text-gray-800 dark:text-gray-100 bg-transparent border-b border-transparent hover:border-gray-300 dark:hover:border-gray-600 focus:border-green-500 focus:outline-none transition-colors px-1 w-48 lg:w-64" />
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="hidden">
                
                <button id="btn-fullscreen" class="p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Toggle Fullscreen">
                    <span class="material-icons text-sm">fullscreen</span>
                </button>

                <button id="btn-freeze" class="p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Freeze Top Row & First Column">
                    <span class="material-icons text-sm">view_stream</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1"></div>

                <button id="btn-theme" class="p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Toggle Dark/Light Mode">
                    <span class="material-icons text-sm" id="theme-icon">dark_mode</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1"></div>

                <button id="btn-new" class="text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                    New
                </button>
                
                <button id="btn-upload" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center space-x-1">
                    <span class="material-icons text-sm">upload_file</span>
                    <span>Open</span>
                </button>

                <div class="relative dropdown">
                    <button class="bg-green-600 text-white hover:bg-green-700 px-3 py-1.5 rounded-md text-sm font-medium transition-colors flex items-center space-x-1 shadow-sm">
                        <span class="material-icons text-sm">download</span>
                        <span>Export</span>
                        <span class="material-icons text-sm">expand_more</span>
                    </button>
                    <div class="dropdown-menu hidden absolute right-0 mt-1 w-48 bg-white dark:bg-gray-800 rounded-md shadow-lg border border-gray-100 dark:border-gray-700 py-1 z-50">
                        <a href="#" id="export-csv" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center"><span class="material-icons text-sm mr-2 text-blue-500">description</span> Save as CSV</a>
                        <a href="#" id="export-xlsx" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center"><span class="material-icons text-sm mr-2 text-green-500">grid_on</span> Save as XLSX</a>
                        <a href="#" id="export-pdf" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center"><span class="material-icons text-sm mr-2 text-red-500">picture_as_pdf</span> Export to PDF</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-workspace">
            <div id="spreadsheet" class="w-full h-full"></div>
        </main>

        <footer class="flex-none bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 text-center py-2 text-xs font-medium text-gray-500 dark:text-gray-400 z-10 transition-colors duration-200">
            Developed by <span class="text-green-600 dark:text-green-400 font-bold">Revanth Reddy Abbati</span>
        </footer>

    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;
        let sheetInstance = null;
        let isFrozen = false;

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Advanced Spreadsheet Initialization ---
            function initSpreadsheet(data = [[]]) {
                const container = document.getElementById('spreadsheet');
                container.innerHTML = ''; 

                sheetInstance = jspreadsheet(container, {
                    data: data,
                    minDimensions: [26, 100], // Start A-Z, 100 rows
                    defaultColWidth: 100,
                    search: true,    // Adds search bar to toolbar
                    filters: true,   // Enables column dropdown filters
                    tableOverflow: true,
                    tableWidth: "100%",
                    tableHeight: "100%",
                    wordWrap: true,
                    // The Formatting Toolbar
                    toolbar: [
                        { type: 'i', content: 'undo', onclick: () => sheetInstance.undo(), tooltip: 'Undo' },
                        { type: 'i', content: 'redo', onclick: () => sheetInstance.redo(), tooltip: 'Redo' },
                        { type: 'select', k: 'font-family', v: ['Arial', 'Verdana', 'Courier New', 'Times New Roman'] },
                        { type: 'select', k: 'font-size', v: ['9px', '10px', '12px', '14px', '16px', '18px'] },
                        { type: 'i', content: 'format_bold', k: 'font-weight', v: 'bold' },
                        { type: 'i', content: 'format_italic', k: 'font-style', v: 'italic' },
                        { type: 'color', content: 'format_color_text', k: 'color', tooltip: 'Text Color' },
                        { type: 'color', content: 'format_color_fill', k: 'background-color', tooltip: 'Background Color' },
                        { type: 'i', content: 'format_align_left', k: 'text-align', v: 'left' },
                        { type: 'i', content: 'format_align_center', k: 'text-align', v: 'center' },
                        { type: 'i', content: 'format_align_right', k: 'text-align', v: 'right' }
                    ]
                });
            }

            // Initialize on load
            initSpreadsheet();

            // --- Dark Mode / Theme Toggle ---
            const btnTheme = document.getElementById('btn-theme');
            const themeIcon = document.getElementById('theme-icon');
            
            btnTheme.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                if (document.documentElement.classList.contains('dark')) {
                    themeIcon.innerText = 'light_mode';
                } else {
                    themeIcon.innerText = 'dark_mode';
                }
            });

            // --- Fullscreen Toggle ---
            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            // --- Freeze Panes Toggle ---
            document.getElementById('btn-freeze').addEventListener('click', () => {
                isFrozen = !isFrozen;
                const config = sheetInstance.getConfig();
                
                // Reinitialize grid with frozen settings
                const currentData = sheetInstance.getData();
                config.freezeColumns = isFrozen ? 1 : 0;
                config.freezeRows = isFrozen ? 1 : 0;
                
                document.getElementById('spreadsheet').innerHTML = '';
                sheetInstance = jspreadsheet(document.getElementById('spreadsheet'), config);
                sheetInstance.setData(currentData);

                // UI Feedback
                document.getElementById('btn-freeze').classList.toggle('bg-gray-200');
                document.getElementById('btn-freeze').classList.toggle('dark:bg-gray-600');
            });

            // --- File Processing (Upload) ---
            const fileInput = document.getElementById('file-input');
            const docTitle = document.getElementById('doc-title');

            document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                docTitle.value = file.name.split('.')[0];
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                    
                    if(rawData.length > 0) initSpreadsheet(rawData);
                };
                reader.readAsBinaryString(file);
                e.target.value = ''; 
            });

            // --- File Operations (New & Export) ---
            document.getElementById('btn-new').addEventListener('click', () => {
                if(confirm("Are you sure? Unsaved changes will be lost.")) {
                    docTitle.value = "Untitled Spreadsheet";
                    initSpreadsheet();
                }
            });

            document.getElementById('export-csv').addEventListener('click', (e) => {
                e.preventDefault();
                sheetInstance.download();
            });

            document.getElementById('export-xlsx').addEventListener('click', (e) => {
                e.preventDefault();
                const finalData = [sheetInstance.getHeaders().split(','), ...sheetInstance.getData()];
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, XLSX.utils.aoa_to_sheet(finalData), "Sheet1");
                XLSX.writeFile(workbook, `${docTitle.value || 'Data'}.xlsx`);
            });

            document.getElementById('export-pdf').addEventListener('click', (e) => {
                e.preventDefault();
                const doc = new jsPDF({ orientation: "landscape" });
                doc.text(docTitle.value, 14, 15);
                doc.autoTable({
                    head: [sheetInstance.getHeaders().split(',')],
                    body: sheetInstance.getData(),
                    startY: 20,
                    theme: document.documentElement.classList.contains('dark') ? 'grid' : 'striped',
                    styles: { fontSize: 8 }
                });
                doc.save(`${docTitle.value || 'Data'}.pdf`);
            });
        });
    </script>
</body>
</html>

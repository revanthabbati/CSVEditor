<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spreadsheet Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        slate: {
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                } 
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-workspace {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #f8fafc;
        }
        
        * { transition: background-color 0.15s ease, border-color 0.15s ease; }

        /* --- Custom Jspreadsheet Adjustments --- */
        .jexcel_container { width: 100% !important; height: 100% !important; border: none !important; }
        .jexcel_content { height: 100% !important; width: 100% !important; box-shadow: none; }

        /* --- Flawless Search Highlight Classes --- */
        .highlight-match {
            background-color: #fef08a !important; 
            color: #000 !important;
            font-weight: 600;
        }
        
        html.dark .highlight-match {
            background-color: #ca8a04 !important; 
            color: #fff !important;
        }

        /* --- Modern, Professional Dark Mode (Slate Palette) --- */
        html.dark .main-workspace { background-color: #0f172a; }
        html.dark .jexcel_container { background: #0f172a !important; border-color: #334155 !important; }
        html.dark .jexcel_content { background: #0f172a !important; }
        
        html.dark .jexcel tbody tr td {
            background-color: #0f172a !important;
            color: #e2e8f0 !important;
            border-bottom: 1px solid #1e293b !important;
            border-right: 1px solid #1e293b !important;
        }
        
        html.dark .jexcel thead td, 
        html.dark .jexcel tbody tr td.jexcel_row {
            background-color: #1e293b !important;
            color: #94a3b8 !important;
            border-bottom: 1px solid #334155 !important;
            border-right: 1px solid #334155 !important;
        }
        
        html.dark .jexcel tbody tr td.highlight { background-color: #1d4ed8 !important; color: #fff !important; }
        html.dark .jexcel tbody tr td.highlight-left { border-left: 1px solid #60a5fa !important; }
        html.dark .jexcel tbody tr td.highlight-right { border-right: 1px solid #60a5fa !important; }
        html.dark .jexcel tbody tr td.highlight-top { border-top: 1px solid #60a5fa !important; }
        html.dark .jexcel tbody tr td.highlight-bottom { border-bottom: 1px solid #60a5fa !important; }
        
        html.dark .jexcel_toolbar { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark .jexcel_toolbar i { color: #cbd5e1 !important; }
        html.dark .jexcel_toolbar i:hover { background-color: #334155 !important; }
        html.dark .jsuites-search-root input { background: #0f172a !important; color: #e2e8f0 !important; border: 1px solid #334155 !important; }
        html.dark .jexcel-filter { background: #1e293b !important; color: white !important; border-color: #334155 !important;}
        html.dark .jexcel_corner { background-color: #1e293b !important; border-right: 1px solid #334155 !important; border-bottom: 1px solid #334155 !important; }

        /* Spinner Animation */
        .loader {
            border-top-color: #16a34a;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-200">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900 bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-slate-800 px-8 py-6 rounded-xl shadow-2xl flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 dark:border-slate-600 h-12 w-12 mb-4"></div>
            <h2 class="text-center text-gray-800 dark:text-gray-100 text-lg font-semibold">Processing Data...</h2>
            <p class="text-center text-gray-500 dark:text-gray-400 text-sm mt-1">Large files may take a few seconds.</p>
        </div>
    </div>

    <div id="app-container">
        
        <nav class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-4 py-2 flex items-center justify-between z-30 shadow-sm flex-none relative">
            
            <div class="flex items-center space-x-4">
                <div class="bg-green-600 p-2 rounded-lg shadow-sm text-white flex items-center justify-center">
                    <span class="material-icons text-xl">table_chart</span>
                </div>
                <div>
                    <input type="text" id="doc-title" value="Untitled Spreadsheet" class="text-xl font-semibold text-gray-800 dark:text-gray-100 bg-transparent border-b-2 border-transparent hover:border-gray-300 dark:hover:border-slate-500 focus:border-green-500 focus:outline-none px-1 py-0.5 w-64 lg:w-80" placeholder="Name your document..." />
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="hidden">
                
                <button id="btn-theme" class="p-2 text-gray-500 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-700 rounded-md" title="Toggle Dark Mode">
                    <span class="material-icons text-sm" id="theme-icon">dark_mode</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-slate-600 mx-1"></div>

                <button id="btn-new" class="text-gray-600 dark:text-gray-300 hover:text-green-600 dark:hover:text-green-400 hover:bg-green-50 dark:hover:bg-slate-700 px-3 py-1.5 rounded-md text-sm font-medium">
                    New File
                </button>
                
                <button id="btn-upload" class="bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-slate-600 px-3 py-1.5 rounded-md text-sm font-medium flex items-center space-x-1 border border-gray-200 dark:border-slate-600 shadow-sm">
                    <span class="material-icons text-sm">upload_file</span>
                    <span>Upload Data</span>
                </button>

                <div class="relative">
                    <button id="btn-download-menu" class="bg-green-600 text-white hover:bg-green-700 px-4 py-1.5 rounded-md text-sm font-medium flex items-center space-x-1 shadow-md">
                        <span class="material-icons text-sm">download</span>
                        <span>Download</span>
                        <span class="material-icons text-sm">expand_more</span>
                    </button>
                    
                    <div id="dropdown-content" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-md shadow-xl border border-gray-100 dark:border-slate-700 overflow-hidden z-50">
                        <button id="export-csv" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center">
                            <span class="material-icons text-sm mr-2 text-blue-500">description</span> Save as .CSV
                        </button>
                        <button id="export-xlsx" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center">
                            <span class="material-icons text-sm mr-2 text-green-500">grid_on</span> Save as .XLSX
                        </button>
                        <button id="export-pdf" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center">
                            <span class="material-icons text-sm mr-2 text-red-500">picture_as_pdf</span> Export to PDF
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 px-4 py-1.5 flex items-center space-x-2 text-sm z-20">
            <span class="text-gray-500 dark:text-gray-400 font-medium mr-2">Quick Tools:</span>
            
            <button id="btn-add-row" class="px-2 py-1 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex items-center">
                <span class="material-icons text-[16px] mr-1">add_row</span> Add Row
            </button>
            <button id="btn-add-col" class="px-2 py-1 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex items-center">
                <span class="material-icons text-[16px] mr-1">view_column</span> Add Col
            </button>
            <div class="w-px h-4 bg-gray-300 dark:bg-slate-600 mx-1"></div>
            <button id="btn-freeze" class="px-2 py-1 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex items-center">
                <span class="material-icons text-[16px] mr-1">ac_unit</span> Freeze Panes
            </button>
            <button id="btn-fullscreen" class="px-2 py-1 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 rounded flex items-center">
                <span class="material-icons text-[16px] mr-1">fullscreen</span> Fullscreen
            </button>
            <div class="w-px h-4 bg-gray-300 dark:bg-slate-600 mx-1"></div>
            <button id="btn-clear" class="px-2 py-1 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-slate-700 rounded flex items-center">
                <span class="material-icons text-[16px] mr-1">delete_sweep</span> Clear Data
            </button>
        </div>

        <main class="main-workspace">
            <div id="spreadsheet" class="w-full h-full"></div>
        </main>

        <footer class="flex-none bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 text-center py-2 text-xs font-medium text-gray-500 dark:text-gray-400 z-10">
            Developed by <span class="text-green-600 dark:text-green-500 font-bold tracking-wide">Revanth Reddy Abbati</span>
        </footer>

    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;
        let sheetInstance = null;
        let isFrozen = false;

        document.addEventListener('DOMContentLoaded', () => {
            
            const overlay = document.getElementById('loading-overlay');

            // --- Dropdown Logic ---
            const downloadBtn = document.getElementById('btn-download-menu');
            const dropdownContent = document.getElementById('dropdown-content');

            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                dropdownContent.classList.toggle('hidden');
            });

            document.addEventListener('click', () => {
                if (!dropdownContent.classList.contains('hidden')) {
                    dropdownContent.classList.add('hidden');
                }
            });

            // --- Spreadsheet Initialization ---
            function initSpreadsheet(data = [[]]) {
                const container = document.getElementById('spreadsheet');
                container.innerHTML = ''; 

                sheetInstance = jspreadsheet(container, {
                    data: data,
                    minDimensions: [26, 100],
                    defaultColWidth: 100,
                    search: true,
                    filters: true,
                    tableOverflow: true,
                    tableWidth: "100%",
                    tableHeight: "100%",
                    wordWrap: true,
                    lazyLoading: true, // <--- PREVENTS BROWSER CRASH ON LARGE FILES
                    
                    updateTable: function(instance, cell, col, row, val, label, cellName) {
                        cell.classList.remove('highlight-match');
                        const searchInput = instance.parentElement.querySelector('.jsuites-search-root input');
                        const query = searchInput ? searchInput.value.trim().toLowerCase() : '';
                        
                        if (query && val !== null && val !== undefined && val !== "") {
                            if (val.toString().toLowerCase().includes(query)) {
                                cell.classList.add('highlight-match');
                            }
                        }
                    },

                    toolbar: [
                        { type: 'i', content: 'undo', onclick: () => sheetInstance.undo(), tooltip: 'Undo' },
                        { type: 'i', content: 'redo', onclick: () => sheetInstance.redo(), tooltip: 'Redo' },
                        { type: 'select', k: 'font-family', v: ['Arial', 'Verdana', 'Courier New', 'Times New Roman'] },
                        { type: 'select', k: 'font-size', v: ['9px', '10px', '12px', '14px', '16px', '18px'] },
                        { type: 'i', content: 'format_bold', k: 'font-weight', v: 'bold' },
                        { type: 'i', content: 'format_italic', k: 'font-style', v: 'italic' },
                        { type: 'color', content: 'format_color_text', k: 'color', tooltip: 'Text Color' },
                        { type: 'color', content: 'format_color_fill', k: 'background-color', tooltip: 'Background Color' },
                        { type: 'i', content: 'format_align_left', k: 'text-align', v: 'left' },
                        { type: 'i', content: 'format_align_center', k: 'text-align', v: 'center' },
                        { type: 'i', content: 'format_align_right', k: 'text-align', v: 'right' }
                    ]
                });
            }

            initSpreadsheet();

            // --- Theme Toggle ---
            const btnTheme = document.getElementById('btn-theme');
            const themeIcon = document.getElementById('theme-icon');
            
            btnTheme.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                themeIcon.innerText = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
            });

            // --- Efficiency Tools Logic ---
            document.getElementById('btn-add-row').addEventListener('click', () => sheetInstance.insertRow());
            document.getElementById('btn-add-col').addEventListener('click', () => sheetInstance.insertColumn());
            
            document.getElementById('btn-clear').addEventListener('click', () => {
                if(confirm("Are you sure you want to clear all data? This cannot be undone.")) {
                    initSpreadsheet([[]]); 
                }
            });

            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            document.getElementById('btn-freeze').addEventListener('click', () => {
                isFrozen = !isFrozen;
                const config = sheetInstance.getConfig();
                const currentData = sheetInstance.getData();
                
                config.freezeColumns = isFrozen ? 1 : 0;
                config.freezeRows = isFrozen ? 1 : 0;
                
                document.getElementById('spreadsheet').innerHTML = '';
                sheetInstance = jspreadsheet(document.getElementById('spreadsheet'), config);
                sheetInstance.setData(currentData);

                document.getElementById('btn-freeze').classList.toggle('bg-green-100');
                document.getElementById('btn-freeze').classList.toggle('dark:bg-slate-600');
            });

            // --- Async File Upload (Prevents UI Freezing) ---
            const fileInput = document.getElementById('file-input');
            const docTitle = document.getElementById('doc-title');

            document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                docTitle.value = file.name.split('.')[0];
                overlay.classList.remove('hidden'); // Show loading spinner

                // Use setTimeout to allow the browser to paint the spinner before heavy processing
                setTimeout(() => {
                    const reader = new FileReader();
                    
                    reader.onload = (event) => {
                        try {
                            const workbook = XLSX.read(event.target.result, { type: 'binary', cellDates: true });
                            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                            const rawData = XLSX.utils.sheet_to_json(worksheet, { 
                                header: 1, 
                                defval: "", 
                                raw: false, 
                                dateNF: 'yyyy-mm-dd hh:mm:ss' 
                            });
                            
                            if(rawData.length > 0) {
                                initSpreadsheet(rawData);
                            } else {
                                alert("File appears to be empty.");
                            }
                        } catch (error) {
                            alert("Error parsing file. Please check the file format.");
                            console.error(error);
                        } finally {
                            overlay.classList.add('hidden'); // Hide spinner when done
                        }
                    };
                    
                    reader.readAsBinaryString(file);
                    e.target.value = ''; 
                }, 50); // 50ms delay
            });

            // --- File Exports ---
            const getFileName = () => {
                const val = docTitle.value.trim();
                return val ? val : 'Untitled_Spreadsheet';
            };

            document.getElementById('btn-new').addEventListener('click', () => {
                if(confirm("Are you sure? Unsaved changes will be lost.")) {
                    docTitle.value = "Untitled Spreadsheet";
                    initSpreadsheet();
                }
            });

            const exportData = (format) => {
                dropdownContent.classList.add('hidden'); // Close menu on click
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                const data = sheetInstance.getData();
                const finalData = [headers, ...data];
                
                const worksheet = XLSX.utils.aoa_to_sheet(finalData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
                
                XLSX.writeFile(workbook, `${getFileName()}.${format}`);
            };

            document.getElementById('export-csv').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('csv');
            });

            document.getElementById('export-xlsx').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('xlsx');
            });

            document.getElementById('export-pdf').addEventListener('click', (e) => {
                e.preventDefault();
                dropdownContent.classList.add('hidden'); // Close menu on click
                const doc = new jsPDF({ orientation: "landscape" });
                doc.text(getFileName(), 14, 15);
                
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                doc.autoTable({
                    head: [headers],
                    body: sheetInstance.getData(),
                    startY: 20,
                    theme: document.documentElement.classList.contains('dark') ? 'grid' : 'striped',
                    styles: { fontSize: 8 }
                });
                doc.save(`${getFileName()}.pdf`);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spreadsheet Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-workspace {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        html.dark .main-workspace { background-color: #121212; }

        /* --- Custom Jspreadsheet Adjustments --- */
        .jexcel_container { width: 100% !important; height: 100% !important; }
        .jexcel_content { 
            height: 100% !important; 
            width: 100% !important;
            box-shadow: none;
        }

        /* --- Professional Dark Mode Theme --- */
        html.dark .jexcel_container { background: #1e1e1e !important; border-color: #333 !important; }
        html.dark .jexcel_content { background: #1e1e1e !important; }
        
        html.dark .jexcel tbody tr td {
            background-color: #1e1e1e !important;
            color: #e0e0e0 !important;
            border-bottom: 1px solid #333 !important;
            border-right: 1px solid #333 !important;
        }
        html.dark .jexcel thead td {
            background-color: #2a2a2a !important;
            color: #bbb !important;
            border-bottom: 1px solid #333 !important;
            border-right: 1px solid #333 !important;
        }
        html.dark .jexcel tbody tr td.jexcel_row { background-color: #2a2a2a !important; color: #bbb !important; }
        html.dark .jexcel tbody tr td.highlight { background-color: #0d47a1 !important; color: #fff !important; }
        html.dark .jexcel tbody tr td.readonly { background-color: #222 !important; }
        
        html.dark .jexcel_toolbar { background-color: #2a2a2a !important; border-color: #333 !important; }
        html.dark .jexcel_toolbar i { color: #e0e0e0 !important; }
        html.dark .jexcel_toolbar i:hover { background-color: #444 !important; }
        html.dark .jsuites-search-root input { background: #1e1e1e !important; color: #e0e0e0 !important; border-color: #444 !important; }
        html.dark .jexcel-filter { background: #2a2a2a !important; color: white !important; border-color: #333 !important;}
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">

    <div id="app-container">
        
        <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3 flex items-center justify-between z-30 shadow-sm flex-none transition-colors duration-200 relative">
            
            <div class="flex items-center space-x-4">
                <div class="bg-green-600 p-2 rounded-lg shadow-sm text-white flex items-center justify-center">
                    <span class="material-icons text-xl">table_chart</span>
                </div>
                <div>
                    <input type="text" id="doc-title" value="Untitled Spreadsheet" class="text-xl font-semibold text-gray-800 dark:text-gray-100 bg-transparent border-b-2 border-transparent hover:border-gray-300 dark:hover:border-gray-600 focus:border-green-500 focus:outline-none transition-colors px-1 py-0.5 w-64 lg:w-80" placeholder="Name your document..." />
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="hidden">
                
                <button id="btn-fullscreen" class="p-2 text-gray-500 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Toggle Fullscreen">
                    <span class="material-icons text-sm">fullscreen</span>
                </button>

                <button id="btn-freeze" class="p-2 text-gray-500 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Freeze Top Row & First Column">
                    <span class="material-icons text-sm">view_stream</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1"></div>

                <button id="btn-theme" class="p-2 text-gray-500 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md transition-colors" title="Toggle Dark Mode">
                    <span class="material-icons text-sm" id="theme-icon">dark_mode</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1"></div>

                <button id="btn-new" class="text-gray-600 dark:text-gray-300 hover:text-green-600 dark:hover:text-green-400 hover:bg-green-50 dark:hover:bg-gray-700 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    New File
                </button>
                
                <button id="btn-upload" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-1 border border-gray-200 dark:border-gray-600 shadow-sm">
                    <span class="material-icons text-sm">upload_file</span>
                    <span>Upload Data</span>
                </button>

                <div class="relative">
                    <button id="btn-download-menu" class="bg-green-600 text-white hover:bg-green-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-1 shadow-md">
                        <span class="material-icons text-sm">download</span>
                        <span>Download</span>
                        <span class="material-icons text-sm">expand_more</span>
                    </button>
                    
                    <div id="dropdown-content" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-md shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden z-50">
                        <button id="export-csv" class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center transition-colors">
                            <span class="material-icons text-sm mr-2 text-blue-500">description</span> Save as .CSV
                        </button>
                        <button id="export-xlsx" class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center transition-colors">
                            <span class="material-icons text-sm mr-2 text-green-500">grid_on</span> Save as .XLSX
                        </button>
                        <button id="export-pdf" class="w-full text-left px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center transition-colors">
                            <span class="material-icons text-sm mr-2 text-red-500">picture_as_pdf</span> Export to PDF
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-workspace">
            <div id="spreadsheet" class="w-full h-full"></div>
        </main>

        <footer class="flex-none bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 text-center py-2 text-xs font-medium text-gray-500 dark:text-gray-400 z-10 transition-colors duration-200">
            Developed by <span class="text-green-600 dark:text-green-500 font-bold tracking-wide">Revanth Reddy Abbati</span>
        </footer>

    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;
        let sheetInstance = null;
        let isFrozen = false;

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Dropdown Menu Click Logic (Fixes Hover Glitches) ---
            const downloadBtn = document.getElementById('btn-download-menu');
            const dropdownContent = document.getElementById('dropdown-content');

            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent document click from immediately closing it
                dropdownContent.classList.toggle('hidden');
            });

            // Close dropdown if clicking anywhere else on the screen
            document.addEventListener('click', () => {
                if (!dropdownContent.classList.contains('hidden')) {
                    dropdownContent.classList.add('hidden');
                }
            });

            // --- Advanced Spreadsheet Initialization ---
            function initSpreadsheet(data = [[]]) {
                const container = document.getElementById('spreadsheet');
                container.innerHTML = ''; 

                sheetInstance = jspreadsheet(container, {
                    data: data,
                    minDimensions: [26, 100],
                    defaultColWidth: 100,
                    search: true,
                    filters: true,
                    tableOverflow: true,
                    tableWidth: "100%",
                    tableHeight: "100%",
                    wordWrap: true,
                    
                    // FIXED: Dynamic Search Highlighting via updateTable hook
                    updateTable: function(instance, cell, col, row, val, label, cellName) {
                        // 1. Reset cell styles
                        cell.style.backgroundColor = '';
                        cell.style.color = '';
                        
                        // 2. Look for search input
                        const searchInput = document.querySelector('.jexcel_search');
                        if (searchInput && searchInput.value) {
                            const query = searchInput.value.toLowerCase();
                            
                            // 3. If cell contains the search query, apply highlighting
                            if (val !== null && val.toString().toLowerCase().includes(query)) {
                                const isDark = document.documentElement.classList.contains('dark');
                                cell.style.backgroundColor = isDark ? '#ca8a04' : '#fef08a'; // Dark Yellow / Light Yellow
                                cell.style.color = isDark ? '#ffffff' : '#000000';
                            }
                        }
                    },

                    toolbar: [
                        { type: 'i', content: 'undo', onclick: () => sheetInstance.undo(), tooltip: 'Undo' },
                        { type: 'i', content: 'redo', onclick: () => sheetInstance.redo(), tooltip: 'Redo' },
                        { type: 'select', k: 'font-family', v: ['Arial', 'Verdana', 'Courier New', 'Times New Roman'] },
                        { type: 'select', k: 'font-size', v: ['9px', '10px', '12px', '14px', '16px', '18px'] },
                        { type: 'i', content: 'format_bold', k: 'font-weight', v: 'bold' },
                        { type: 'i', content: 'format_italic', k: 'font-style', v: 'italic' },
                        { type: 'color', content: 'format_color_text', k: 'color', tooltip: 'Text Color' },
                        { type: 'color', content: 'format_color_fill', k: 'background-color', tooltip: 'Background Color' },
                        { type: 'i', content: 'format_align_left', k: 'text-align', v: 'left' },
                        { type: 'i', content: 'format_align_center', k: 'text-align', v: 'center' },
                        { type: 'i', content: 'format_align_right', k: 'text-align', v: 'right' }
                    ]
                });
            }

            initSpreadsheet();

            // --- Theme Toggle ---
            const btnTheme = document.getElementById('btn-theme');
            const themeIcon = document.getElementById('theme-icon');
            
            btnTheme.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                themeIcon.innerText = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
                // Trigger grid refresh so highlights update to new theme colors
                if(sheetInstance) sheetInstance.refresh();
            });

            // --- Fullscreen Toggle ---
            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            // --- Freeze Panes Toggle ---
            document.getElementById('btn-freeze').addEventListener('click', () => {
                isFrozen = !isFrozen;
                const config = sheetInstance.getConfig();
                const currentData = sheetInstance.getData();
                
                config.freezeColumns = isFrozen ? 1 : 0;
                config.freezeRows = isFrozen ? 1 : 0;
                
                document.getElementById('spreadsheet').innerHTML = '';
                sheetInstance = jspreadsheet(document.getElementById('spreadsheet'), config);
                sheetInstance.setData(currentData);

                document.getElementById('btn-freeze').classList.toggle('bg-gray-200');
                document.getElementById('btn-freeze').classList.toggle('dark:bg-gray-600');
            });

            // --- File Upload ---
            const fileInput = document.getElementById('file-input');
            const docTitle = document.getElementById('doc-title');

            document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                docTitle.value = file.name.split('.')[0];
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary', cellDates: true });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { 
                        header: 1, 
                        defval: "", 
                        raw: false, 
                        dateNF: 'yyyy-mm-dd hh:mm:ss' 
                    });
                    
                    if(rawData.length > 0) initSpreadsheet(rawData);
                };
                reader.readAsBinaryString(file);
                e.target.value = ''; 
            });

            // --- File Operations (New & Export) ---
            const getFileName = () => {
                const val = docTitle.value.trim();
                return val ? val : 'Untitled_Spreadsheet';
            };

            document.getElementById('btn-new').addEventListener('click', () => {
                if(confirm("Are you sure? Unsaved changes will be lost.")) {
                    docTitle.value = "Untitled Spreadsheet";
                    initSpreadsheet();
                }
            });

            const exportData = (format) => {
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                const data = sheetInstance.getData();
                const finalData = [headers, ...data];
                
                const worksheet = XLSX.utils.aoa_to_sheet(finalData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
                
                XLSX.writeFile(workbook, `${getFileName()}.${format}`);
            };

            document.getElementById('export-csv').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('csv');
            });

            document.getElementById('export-xlsx').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('xlsx');
            });

            document.getElementById('export-pdf').addEventListener('click', (e) => {
                e.preventDefault();
                const doc = new jsPDF({ orientation: "landscape" });
                doc.text(getFileName(), 14, 15);
                
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                doc.autoTable({
                    head: [headers],
                    body: sheetInstance.getData(),
                    startY: 20,
                    theme: document.documentElement.classList.contains('dark') ? 'grid' : 'striped',
                    styles: { fontSize: 8 }
                });
                doc.save(`${getFileName()}.pdf`);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spreadsheet Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
    <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
    <script src="https://jsuites.net/v4/jsuites.js"></script>
    <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-workspace {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        
        html.dark .main-workspace { background-color: #1e1e1e; }

        /* --- Custom Jspreadsheet Adjustments --- */
        .jexcel_container { width: 100% !important; height: 100% !important; }
        .jexcel_content { 
            height: 100% !important; 
            width: 100% !important;
            box-shadow: none;
        }

        /* --- Search Highlight Styles --- */
        .search-highlight {
            background-color: #fef08a !important; /* Yellow highlight */
            color: #000 !important;
            font-weight: 600 !important;
            transition: background-color 0.2s;
        }
        
        html.dark .search-highlight {
            background-color: #ca8a04 !important; /* Darker yellow for dark mode */
            color: #fff !important;
        }

        /* --- Professional Dark Mode Theme (VS Code Style) --- */
        html.dark .jexcel_container { background: #1e1e1e !important; border-color: #3c3c3c !important; }
        html.dark .jexcel_content { background: #1e1e1e !important; }
        
        /* Cells */
        html.dark .jexcel tbody tr td {
            background-color: #1e1e1e !important;
            color: #d4d4d4 !important;
            border-bottom: 1px solid #3c3c3c !important;
            border-right: 1px solid #3c3c3c !important;
        }
        /* Headers */
        html.dark .jexcel thead td {
            background-color: #2d2d2d !important;
            color: #cccccc !important;
            border-bottom: 1px solid #3c3c3c !important;
            border-right: 1px solid #3c3c3c !important;
            font-weight: 500;
        }
        /* Row Index */
        html.dark .jexcel tbody tr td.jexcel_row {
            background-color: #2d2d2d !important;
            color: #cccccc !important;
        }
        /* Selected/Highlight cell */
        html.dark .jexcel tbody tr td.highlight { background-color: #062f4a !important; color: #fff !important; }
        html.dark .jexcel tbody tr td.highlight-left { border-left: 1px solid #007acc !important; }
        html.dark .jexcel tbody tr td.highlight-right { border-right: 1px solid #007acc !important; }
        html.dark .jexcel tbody tr td.highlight-top { border-top: 1px solid #007acc !important; }
        html.dark .jexcel tbody tr td.highlight-bottom { border-bottom: 1px solid #007acc !important; }
        html.dark .jexcel tbody tr td.readonly { background-color: #252526 !important; }
        
        /* Toolbar */
        html.dark .jexcel_toolbar { background-color: #2d2d2d !important; border-color: #3c3c3c !important; }
        html.dark .jexcel_toolbar i { color: #cccccc !important; }
        html.dark .jexcel_toolbar i:hover { background-color: #3c3c3c !important; }
        html.dark .jsuites-search-root input { background: #1e1e1e !important; color: #d4d4d4 !important; border-color: #3c3c3c !important; }
        html.dark .jexcel-filter { background: #2d2d2d !important; color: white !important; border-color: #3c3c3c !important;}

        /* --- Bulletproof Export Dropdown --- */
        .export-dropdown { position: relative; display: inline-block; }
        .export-dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            min-width: 170px;
            z-index: 100;
            padding-top: 8px; /* Creates the invisible hover bridge */
        }
        .export-dropdown:hover .export-dropdown-menu { display: block; }
        
        .export-dropdown-content {
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        html.dark .export-dropdown-content { background-color: #2d2d2d; border-color: #3c3c3c; }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            font-size: 14px;
            color: #374151;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.1s;
        }
        html.dark .dropdown-item { color: #d4d4d4; }
        .dropdown-item:hover { background-color: #f3f4f6; }
        html.dark .dropdown-item:hover { background-color: #3c3c3c; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#1e1e1e] transition-colors duration-200">

    <div id="app-container">
        
        <nav class="bg-white dark:bg-[#2d2d2d] border-b border-gray-200 dark:border-[#3c3c3c] px-4 py-3 flex items-center justify-between z-20 shadow-sm flex-none transition-colors duration-200">
            
            <div class="flex items-center space-x-4">
                <div class="bg-green-600 p-2 rounded-lg shadow-sm text-white flex items-center justify-center">
                    <span class="material-icons text-xl">table_chart</span>
                </div>
                <div>
                    <input type="text" id="doc-title" value="Untitled Spreadsheet" class="text-xl font-semibold text-gray-800 dark:text-[#cccccc] bg-transparent border-b-2 border-transparent hover:border-gray-300 dark:hover:border-gray-500 focus:border-green-500 focus:outline-none transition-colors px-1 py-0.5 w-64 lg:w-80" placeholder="Name your document..." />
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="hidden">
                
                <button id="btn-fullscreen" class="p-2 text-gray-500 dark:text-[#cccccc] hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-[#3c3c3c] rounded-md transition-colors" title="Toggle Fullscreen">
                    <span class="material-icons text-sm">fullscreen</span>
                </button>

                <button id="btn-freeze" class="p-2 text-gray-500 dark:text-[#cccccc] hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-[#3c3c3c] rounded-md transition-colors" title="Freeze Top Row & First Column">
                    <span class="material-icons text-sm">view_stream</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-[#444] mx-1"></div>

                <button id="btn-theme" class="p-2 text-gray-500 dark:text-[#cccccc] hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-[#3c3c3c] rounded-md transition-colors" title="Toggle Dark/Light Mode">
                    <span class="material-icons text-sm" id="theme-icon">dark_mode</span>
                </button>

                <div class="w-px h-6 bg-gray-300 dark:bg-[#444] mx-1"></div>

                <button id="btn-new" class="text-gray-600 dark:text-[#cccccc] hover:text-green-600 dark:hover:text-green-400 hover:bg-green-50 dark:hover:bg-[#3c3c3c] px-4 py-2 rounded-md text-sm font-medium transition-colors">
                    New File
                </button>
                
                <button id="btn-upload" class="bg-gray-100 dark:bg-[#3c3c3c] text-gray-700 dark:text-[#cccccc] hover:bg-gray-200 dark:hover:bg-[#4a4a4a] px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-1 border border-gray-200 dark:border-[#3c3c3c] shadow-sm">
                    <span class="material-icons text-sm">upload_file</span>
                    <span>Upload Data</span>
                </button>

                <div class="export-dropdown">
                    <button class="bg-green-600 text-white hover:bg-green-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-1 shadow-md">
                        <span class="material-icons text-sm">download</span>
                        <span>Download</span>
                        <span class="material-icons text-sm">expand_more</span>
                    </button>
                    <div class="export-dropdown-menu">
                        <div class="export-dropdown-content">
                            <a id="export-csv" class="dropdown-item">
                                <span class="material-icons text-sm mr-2 text-blue-500">description</span> Save as .CSV
                            </a>
                            <a id="export-xlsx" class="dropdown-item">
                                <span class="material-icons text-sm mr-2 text-green-500">grid_on</span> Save as .XLSX
                            </a>
                            <a id="export-pdf" class="dropdown-item">
                                <span class="material-icons text-sm mr-2 text-red-500">picture_as_pdf</span> Export to PDF
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="main-workspace">
            <div id="spreadsheet" class="w-full h-full"></div>
        </main>

        <footer class="flex-none bg-white dark:bg-[#2d2d2d] border-t border-gray-200 dark:border-[#3c3c3c] text-center py-2 text-xs font-medium text-gray-500 dark:text-[#888] z-10 transition-colors duration-200">
            Developed by <span class="text-green-600 dark:text-green-500 font-bold tracking-wide">Revanth Reddy Abbati</span>
        </footer>

    </div>

    <script>
        window.jsPDF = window.jspdf.jsPDF;
        let sheetInstance = null;
        let isFrozen = false;

        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Advanced Spreadsheet Initialization ---
            function initSpreadsheet(data = [[]]) {
                const container = document.getElementById('spreadsheet');
                container.innerHTML = ''; 

                sheetInstance = jspreadsheet(container, {
                    data: data,
                    minDimensions: [26, 100],
                    defaultColWidth: 100,
                    search: true,
                    filters: true,
                    tableOverflow: true,
                    tableWidth: "100%",
                    tableHeight: "100%",
                    wordWrap: true,
                    
                    // NEW: Search engine hook for highlighting text
                    onsearch: function(el, obj, query) {
                        // Clear old highlights
                        container.querySelectorAll('.search-highlight').forEach(cell => cell.classList.remove('search-highlight'));
                        
                        if (!query) return; // Exit if search is cleared
                        
                        // Find matching cells and highlight them
                        const cells = container.querySelectorAll('tbody td[data-x]');
                        const lowerQuery = query.toLowerCase();
                        
                        cells.forEach(cell => {
                            if (cell.innerText.toLowerCase().includes(lowerQuery)) {
                                cell.classList.add('search-highlight');
                            }
                        });
                    },

                    toolbar: [
                        { type: 'i', content: 'undo', onclick: () => sheetInstance.undo(), tooltip: 'Undo' },
                        { type: 'i', content: 'redo', onclick: () => sheetInstance.redo(), tooltip: 'Redo' },
                        { type: 'select', k: 'font-family', v: ['Arial', 'Verdana', 'Courier New', 'Times New Roman'] },
                        { type: 'select', k: 'font-size', v: ['9px', '10px', '12px', '14px', '16px', '18px'] },
                        { type: 'i', content: 'format_bold', k: 'font-weight', v: 'bold' },
                        { type: 'i', content: 'format_italic', k: 'font-style', v: 'italic' },
                        { type: 'color', content: 'format_color_text', k: 'color', tooltip: 'Text Color' },
                        { type: 'color', content: 'format_color_fill', k: 'background-color', tooltip: 'Background Color' },
                        { type: 'i', content: 'format_align_left', k: 'text-align', v: 'left' },
                        { type: 'i', content: 'format_align_center', k: 'text-align', v: 'center' },
                        { type: 'i', content: 'format_align_right', k: 'text-align', v: 'right' }
                    ]
                });
            }

            initSpreadsheet();

            // --- Theme Toggle ---
            const btnTheme = document.getElementById('btn-theme');
            const themeIcon = document.getElementById('theme-icon');
            
            btnTheme.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                themeIcon.innerText = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode';
            });

            // --- Fullscreen Toggle ---
            document.getElementById('btn-fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });

            // --- Freeze Panes Toggle ---
            document.getElementById('btn-freeze').addEventListener('click', () => {
                isFrozen = !isFrozen;
                const config = sheetInstance.getConfig();
                const currentData = sheetInstance.getData();
                
                config.freezeColumns = isFrozen ? 1 : 0;
                config.freezeRows = isFrozen ? 1 : 0;
                
                document.getElementById('spreadsheet').innerHTML = '';
                sheetInstance = jspreadsheet(document.getElementById('spreadsheet'), config);
                sheetInstance.setData(currentData);

                document.getElementById('btn-freeze').classList.toggle('bg-gray-200');
                document.getElementById('btn-freeze').classList.toggle('dark:bg-[#444]');
            });

            // --- File Upload ---
            const fileInput = document.getElementById('file-input');
            const docTitle = document.getElementById('doc-title');

            document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                docTitle.value = file.name.split('.')[0];
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    const workbook = XLSX.read(event.target.result, { type: 'binary', cellDates: true });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { 
                        header: 1, 
                        defval: "", 
                        raw: false, 
                        dateNF: 'yyyy-mm-dd hh:mm:ss' 
                    });
                    
                    if(rawData.length > 0) initSpreadsheet(rawData);
                };
                reader.readAsBinaryString(file);
                e.target.value = ''; 
            });

            // --- File Operations (New & Export) ---
            const getFileName = () => {
                const val = docTitle.value.trim();
                return val ? val : 'Untitled_Spreadsheet';
            };

            document.getElementById('btn-new').addEventListener('click', () => {
                if(confirm("Are you sure? Unsaved changes will be lost.")) {
                    docTitle.value = "Untitled Spreadsheet";
                    initSpreadsheet();
                }
            });

            const exportData = (format) => {
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                const data = sheetInstance.getData();
                const finalData = [headers, ...data];
                
                const worksheet = XLSX.utils.aoa_to_sheet(finalData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
                
                XLSX.writeFile(workbook, `${getFileName()}.${format}`);
            };

            document.getElementById('export-csv').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('csv');
            });

            document.getElementById('export-xlsx').addEventListener('click', (e) => {
                e.preventDefault();
                exportData('xlsx');
            });

            document.getElementById('export-pdf').addEventListener('click', (e) => {
                e.preventDefault();
                const doc = new jsPDF({ orientation: "landscape" });
                doc.text(getFileName(), 14, 15);
                
                const headers = sheetInstance.getHeaders() ? sheetInstance.getHeaders().split(',') : [];
                doc.autoTable({
                    head: [headers],
                    body: sheetInstance.getData(),
                    startY: 20,
                    theme: document.documentElement.classList.contains('dark') ? 'grid' : 'striped',
                    styles: { fontSize: 8 }
                });
                doc.save(`${getFileName()}.pdf`);
            });
        });
    </script>
</body>
</html>
